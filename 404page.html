<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Off The Market | Luxury Real Estate</title>
    <link rel="icon" type="image/png" href="./asset/logo_Favicon.webp">

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {

            --bg-white: #ffffff;
            --emerald-green: #059669;
            --emerald-light: rgba(5, 150, 105, 0.08);
            --text-dark: #1f2937;
            --text-gray: #4b5563;


            --emerald-dark: #047857;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg-white);

            background-image: url('./asset/u25.webp');
            background-size: cover;
            background-position: center;
            position: relative;
        }


        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.295) 0%, rgba(27, 27, 27, 0.267) 100%);
            z-index: 1;
        }


        .luxury-card {
            position: relative;
            z-index: 10;
            background: var(--bg-white);
            border: 1px solid var(--emerald-light);
            border-radius: 16px;
            padding: 60px 50px;
            text-align: center;
            max-width: 650px;
            width: 90%;

            box-shadow: 0 25px 50px rgba(31, 41, 55, 0.08), 0 0 0 10px var(--emerald-light);
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-wrapper {
            margin-bottom: 20px;
            color: var(--emerald-green);
            font-size: 2.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 7.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
            color: var(--emerald-green);
            letter-spacing: 2px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        p {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 4px;
        }


        .btn-primary {
            background-color: var(--emerald-green);
            color: var(--bg-white);
            border: 1px solid var(--emerald-green);
        }

        .btn-primary:hover {
            background-color: var(--emerald-dark);
            border-color: var(--emerald-dark);
            box-shadow: 0 10px 20px var(--emerald-light);
            transform: translateY(-2px);
        }


        .btn-outline {
            background-color: transparent;
            color: var(--emerald-green);
            border: 1px solid var(--emerald-green);
        }

        .btn-outline:hover {
            background: var(--emerald-light);
            transform: translateY(-2px);
        }


        @media (max-width: 768px) {
            .luxury-card {
                padding: 40px 25px;
                box-shadow: 0 15px 30px rgba(31, 41, 55, 0.05), 0 0 0 6px var(--emerald-light);
            }

            .error-code {
                font-size: 5.5rem;
            }

            h2 {
                font-size: 1.6rem;
            }

            p {
                font-size: 0.95rem;
            }

            .btn-group {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>


    <div class="overlay"></div>

    <div class="luxury-card">
        <div class="icon-wrapper">

            <i class="fa-solid fa-house-circle-xmark"></i>
        </div>
        <div class="error-code">404</div>
        <h2>Off The Market</h2>
        <p>The exclusive property you are searching for is currently unavailable or sold. Explore our premium portfolio
            for similar estates.</p>

        <div class="btn-group">
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="fa-solid fa-arrow-left-long"></i> Return
            </a>
            <a href="index.html" class="btn btn-primary">
                View Portfolio <i class="fa-solid fa-arrow-right-long"></i>
            </a>
        </div>
    </div>

</body>

</html>
